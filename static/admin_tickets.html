<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racer Grid</title>
  <link rel="stylesheet" href="/assets/mario-kart.css">
</head>
<body>
  <header class="race-header">
    <h1 class="race-header__title">Mario Kart Grand Prix</h1>
  </header>
  
  <section class="race-marquee" aria-hidden="true">
    <div class="race-marquee__lane">
      <span class="race-marquee__brand">🏁 Race Weekend</span>
      <span class="race-marquee__pill">🍄 Mushroom Cup</span>
      <span class="race-marquee__pill">🌸 Flower Cup</span>
      <span class="race-marquee__pill">⭐ Star Cup</span>
      <span class="race-marquee__pill">🌈 Rainbow Road</span>
      <span class="race-marquee__brand">🏁 Race Weekend</span>
      <span class="race-marquee__pill">🍄 Mushroom Cup</span>
      <span class="race-marquee__pill">🌸 Flower Cup</span>
      <span class="race-marquee__pill">⭐ Star Cup</span>
      <span class="race-marquee__pill">🌈 Rainbow Road</span>
    </div>
  </section>

  <main class="shell">
    <section class="card" style="width:min(100%,900px)">
      <p class="eyebrow">Admin</p>
      <h1>Racer Grid</h1>
      <p class="lead"><a href="/admin">Admin home</a> | <a href="/admin/seating">Seating control</a></p>

      <table style="width:100%; margin-top:20px; border-collapse:collapse;">
        <thead>
          <tr>
            <th>ID</th><th>Racer</th><th>Kart</th><th>Ticket</th><th>Grid</th><th>Status</th>
          </tr>
        </thead>
        <tbody>
          {{TICKET_ROWS}}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
